name: Docker

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: replaykit:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test - collector starts
        run: |
          docker run --rm -d --name smoke-collector \
            -e REPLAYKIT_PORT=4100 \
            -e REPLAYKIT_DATA_ROOT=/data \
            -p 4100:4100 \
            replaykit:ci replaykit-collector
          for i in $(seq 1 15); do
            if curl -sf -o /dev/null -X POST http://localhost:4100/v1/runs \
              -H 'Content-Type: application/json' \
              -d '{"title":"ci","entrypoint":"ci","adapter_name":"ci","adapter_version":"0.1","started_at":1}' 2>/dev/null; then
              echo "Collector responded"
              break
            fi
            sleep 1
          done
          docker stop smoke-collector

      - name: Smoke test - API starts
        run: |
          docker run --rm -d --name smoke-api \
            -p 3210:3210 \
            replaykit:ci \
            replaykit --storage sqlite --data-root /data serve --port 3210 --host 0.0.0.0
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3210/api/v1/runs > /dev/null 2>&1; then
              echo "API responded"
              break
            fi
            sleep 1
          done
          docker stop smoke-api
