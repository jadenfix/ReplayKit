name: Docker

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stack-smoke:
    name: compose + browser smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build compose stack
        run: docker compose build

      - name: Start compose stack
        run: docker compose up -d

      - name: Wait for collector /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4100/healthz > /dev/null; then
              echo "collector ready"; exit 0
            fi
            sleep 2
          done
          echo "collector did not become ready"; exit 1

      - name: Wait for api /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3210/healthz > /dev/null; then
              echo "api ready"; exit 0
            fi
            sleep 2
          done
          echo "api did not become ready"; exit 1

      - name: Wait for web /
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5173/ > /dev/null; then
              echo "web ready"; exit 0
            fi
            sleep 2
          done
          echo "web did not become ready"; exit 1

      - name: Seed one run through collector
        env:
          REPLAYKIT_COLLECTOR_URL: http://127.0.0.1:4100
        run: bash scripts/seed-stack-run.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps for Playwright
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
        run: npm run test:e2e

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
